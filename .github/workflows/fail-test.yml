name: Fail - Test Regression

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write failing test
        run: |
          mkdir -p src/test/java/com/testapp
          cat > src/test/java/com/testapp/FailingTest.java << 'EOF'
          package com.testapp;

          import org.junit.jupiter.api.Test;
          import static org.junit.jupiter.api.Assertions.*;

          class FailingTest {
              @Test
              void thisTestAlwaysFails() {
                  // This test intentionally fails to simulate a test regression
                  assertEquals("expected value",
                      "actual different value",
                      "Simulated test regression — expected behavior changed");
              }
          }
          EOF

      - name: Run tests
        run: mvn test