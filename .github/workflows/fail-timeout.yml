name: Fail - Timeout

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  timeout-job:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write sleep-triggering code
        run: |
          mkdir -p src/main/java/com/testapp
          cat > src/main/java/com/testapp/TimeoutTrigger.java << 'EOF'
          package com.testapp;

          public class TimeoutTrigger {
              public static void main(String[] args) throws InterruptedException {
                  System.out.println("Starting long-running task...");
                  Thread.sleep(120000);
                  System.out.println("This should never print - job times out first");
              }
          }
          EOF

      - name: Compile
        run: |
          mkdir -p target/classes
          javac -d target/classes src/main/java/com/testapp/TimeoutTrigger.java

      - name: Run and sleep past the job timeout
        run: java -cp target/classes com.testapp.TimeoutTrigger