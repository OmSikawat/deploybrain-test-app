name: Fail - Environment Mismatch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  env-mismatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Reference an undefined environment variable
        run: |
          echo "Attempting to use required config that was never set..."
          if [ -z "$REQUIRED_DB_CONNECTION_STRING" ]; then
            echo "ERROR: Environment variable REQUIRED_DB_CONNECTION_STRING is not set"
            exit 1
          fi
          echo "This should never print"